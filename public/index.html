<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Samudera Caraka Jasa — KPI Dashboard 2026</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
  :root {
    --bg: #F8FAFC;
    --bg2: #F1F5F9;
    --card: #FFFFFF;
    --card-hover: #F8FAFC;
    --border: #E5E7EB;
    --border-light: #D1D5DB;
    --text: #111827;
    --text-dim: #6B7280;
    --text-muted: #9CA3AF;
    --primary: #00C2FF;
    --primary-dim: rgba(0,194,255,0.08);
    --success: #22C55E;
    --success-dim: rgba(34,197,94,0.08);
    --warning: #F59E0B;
    --warning-dim: rgba(245,158,11,0.08);
    --danger: #EF4444;
    --danger-dim: rgba(239,68,68,0.08);
    --radius: 12px;
    --radius-sm: 8px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* ── Header ────────────────────────────────────────────────────────────── */
  .header {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 16px 32px 12px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    flex-wrap: wrap;
    gap: 8px;
  }
  .header-left { display: flex; align-items: center; gap: 16px; }
  .header-logo { height: 42px; width: auto; object-fit: contain; border-radius: 4px; }
  .header-title-group { }
  .header-title {
    font-size: 20px; font-weight: 700; letter-spacing: -0.3px;
    color: var(--text); line-height: 1.2;
  }
  .header-title span { color: var(--primary); }
  .header-sub {
    font-size: 12px; color: var(--text-dim); font-weight: 400;
    margin-top: 1px; letter-spacing: 0.2px;
  }
  .header-right { display: flex; align-items: center; gap: 10px; }

  /* ── Container ─────────────────────────────────────────────────────────── */
  .container { max-width: 1600px; margin: 0 auto; padding: 16px 24px; }

  /* ── Executive KPI Bar ─────────────────────────────────────────────────── */
  .exec-bar {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr;
    gap: 1px;
    background: var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    margin-bottom: 16px;
    border: 1px solid var(--border);
  }
  .exec-bar-item {
    background: var(--card);
    padding: 16px 20px;
    text-align: center;
    position: relative;
  }
  .exec-bar-item .label {
    font-size: 11px; font-weight: 500; color: var(--text-dim);
    text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 4px;
  }
  .exec-bar-item .value {
    font-size: 26px; font-weight: 700; letter-spacing: -0.5px;
    line-height: 1.1;
  }
  .exec-bar-item .sub { font-size: 12px; margin-top: 4px; font-weight: 400; }
  .exec-bar-item.primary .value { color: var(--primary); }
  .exec-bar-item.success .value { color: var(--success); }
  .exec-bar-item.warning .value { color: var(--warning); }
  .exec-bar-item.danger .value { color: var(--danger); }
  .exec-bar-item .bar-wrap {
    margin-top: 8px; background: var(--bg); border-radius: 4px;
    height: 6px; overflow: hidden;
  }
  .exec-bar-item .bar-fill {
    height: 100%; border-radius: 4px;
    background: linear-gradient(90deg, var(--primary), #00E5FF);
    transition: width 0.6s ease;
  }
  .exec-bar-item .gap-neg { color: var(--danger); }
  .exec-bar-item .gap-pos { color: var(--success); }
  .exec-bar-item.ach {
    background: linear-gradient(135deg, var(--card), rgba(0,194,255,0.03));
  }
  .exec-bar-item.ach .value { font-size: 32px; }

  /* ── Equal height cards in grid-3 ─────────────────────────────────────── */
  .grid-3 .card { display: flex; flex-direction: column; }
  .grid-3 .card .table-wrap { flex: 1; overflow-y: auto; }
  .grid-3 .card .table-wrap,
  .grid-3 .card .sales-list { flex: 1; overflow-y: auto; max-height: 440px; }

  /* ── Summary Row ───────────────────────────────────────────────────────── */
  .summary-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 16px;
  }
  .summary-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 18px;
    transition: border-color 0.2s, transform 0.15s;
  }
  .summary-card:hover { border-color: var(--border-light); transform: translateY(-1px); }
  .summary-card .label {
    font-size: 11px; font-weight: 500; color: var(--text-dim);
    letter-spacing: 0.5px;
  }
  .summary-card .value {
    font-size: 22px; font-weight: 700; margin-top: 2px;
    letter-spacing: -0.5px;
  }
  .summary-card .sub { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
  .summary-card.gp .value { color: var(--primary); }
  .summary-card.shipments .value { color: var(--success); }
  .summary-card.customers .value { color: var(--warning); }
  .summary-card.kpis .value { color: var(--text); }

  /* ── Grid Layout ───────────────────────────────────────────────────────── */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-bottom: 16px; }
  .full { margin-bottom: 16px; }
  @media (max-width: 1100px) { .grid-2 { grid-template-columns: 1fr; } .grid-3 { grid-template-columns: 1fr; } }
  @media (max-width: 768px) { .exec-bar { grid-template-columns: 1fr 1fr; } .summary-row { grid-template-columns: 1fr 1fr; } }

  /* ── Cards ─────────────────────────────────────────────────────────────── */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
  }
  .card-title {
    font-size: 12px; font-weight: 600; margin-bottom: 12px;
    color: var(--text-dim); letter-spacing: 0.3px;
  }
  .card canvas { width: 100% !important; max-height: 400px; }

  /* Large trend chart */
  .card.trend-card { padding: 16px; }
  .card.trend-card .card-title { font-size: 13px; font-weight: 600; }
  .card.trend-card canvas { max-height: 420px; }

  /* ── Tables ────────────────────────────────────────────────────────────── */
  .table-wrap { overflow-x: auto; }
  .data-table {
    width: 100%; border-collapse: separate; border-spacing: 0;
    font-size: 12px;
  }
  .data-table thead th {
    position: sticky; top: 0; z-index: 2;
    background: var(--bg2);
    text-align: left; padding: 7px 10px;
    font-size: 10px; font-weight: 600; color: var(--text-dim);
    letter-spacing: 0.5px; text-transform: uppercase;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  .data-table tbody td {
    padding: 6px 10px;
    border-bottom: 1px solid rgba(0,0,0,0.06);
    white-space: nowrap;
  }
  .data-table .cell-cust {
    max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .data-table .cell-name {
    max-width: 130px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .data-table tbody tr:hover td { background: var(--card-hover); }
  .data-table .name { font-weight: 600; color: var(--text); }
  .data-table .num { text-align: right; font-variant-numeric: tabular-nums; }
  .data-table .ach-good { color: var(--success); font-weight: 600; }
  .data-table .ach-warn { color: var(--warning); font-weight: 600; }
  .data-table .ach-bad { color: var(--danger); font-weight: 600; }
  .data-table .team-hdr {
    background: var(--primary-dim);
    font-weight: 600; color: var(--primary);
    font-size: 11px; letter-spacing: 0.3px;
  }

  /* ── Top Sales ─────────────────────────────────────────────────────────── */
  .sales-list { list-style: none; }
  .sales-list li {
    display: flex; justify-content: space-between; align-items: center;
    padding: 5px 0; border-bottom: 1px solid rgba(0,0,0,0.06);
  }
  .sales-list li:last-child { border-bottom: none; }
  .sales-list .rank {
    width: 22px; height: 22px; border-radius: 50%;
    background: var(--bg); display: inline-flex; align-items: center;
    justify-content: center; font-size: 10px; font-weight: 700;
    color: var(--text-dim); margin-right: 10px;
  }
  .sales-list .name { flex: 1; font-weight: 500; font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .sales-list .team-tag {
    font-size: 10px; padding: 2px 8px; border-radius: 4px;
    background: var(--primary-dim); color: var(--primary); margin-right: 12px;
    font-weight: 500;
  }
  .sales-list .gp-val { font-weight: 700; color: var(--primary); }

  /* ── Collapsible Section ───────────────────────────────────────────────── */
  .collapsible-header {
    display: flex; align-items: center; gap: 8px;
    padding: 14px 20px; background: var(--card);
    border: 1px solid var(--border); border-radius: var(--radius);
    cursor: pointer; transition: border-color 0.2s;
    margin-bottom: 0;
    font-size: 13px; font-weight: 600; color: var(--text-dim);
    letter-spacing: 0.3px;
  }
  .collapsible-header:hover { border-color: var(--border-light); }
  .collapsible-header .arrow {
    font-size: 10px; transition: transform 0.25s ease; color: var(--text-muted);
  }
  .collapsible-header.open .arrow { transform: rotate(90deg); }
  .collapsible-body {
    display: none;
    border: 1px solid var(--border); border-top: none;
    border-radius: 0 0 var(--radius) var(--radius);
    background: var(--card);
    padding: 16px;
    margin-bottom: 16px;
  }
  .collapsible-body.open { display: block; }

  /* ── Loading ───────────────────────────────────────────────────────────── */
  .loading {
    display: flex; align-items: center; justify-content: center;
    height: 60vh; font-size: 16px; color: var(--text-dim);
  }
  .spinner {
    width: 28px; height: 28px; border: 2px solid var(--border);
    border-top-color: var(--primary); border-radius: 50%;
    animation: spin 0.7s linear infinite; margin-right: 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Multi-Select Filters ──────────────────────────────────────────────── */
  .filter-bar {
    display: flex; gap: 8px; align-items: flex-start; flex-wrap: wrap;
  }
  .fw { position: relative; min-width: 140px; max-width: 200px; }
  .ft {
    width: 100%; padding: 7px 28px 7px 12px; background: var(--bg);
    color: var(--text); border: 1px solid var(--border); border-radius: var(--radius-sm);
    font-size: 12px; cursor: pointer; text-align: left; white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis; position: relative;
    font-family: inherit;
  }
  .ft::after {
    content: ''; position: absolute; right: 10px; top: 50%;
    transform: translateY(-50%);
    border-left: 4px solid transparent; border-right: 4px solid transparent;
    border-top: 5px solid var(--text-muted);
  }
  .fd {
    display: none; position: absolute; top: 100%; left: 0; right: 0; z-index: 100;
    background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-sm);
    margin-top: 3px; max-height: 280px; overflow: hidden;
    box-shadow: 0 8px 32px rgba(0,0,0,0.12);
  }
  .fd.open { display: flex; flex-direction: column; }
  .fs {
    padding: 7px 10px; background: var(--bg); border: none;
    border-bottom: 1px solid var(--border); color: var(--text);
    font-size: 12px; outline: none; width: 100%; font-family: inherit;
  }
  .fo {
    overflow-y: auto; flex: 1; max-height: 200px;
  }
  .fo label {
    display: flex; align-items: center; gap: 6px; padding: 5px 10px;
    font-size: 12px; cursor: pointer; color: var(--text); transition: background 0.1s;
  }
  .fo label:hover { background: var(--card-hover); }
  .fo input[type=checkbox] { accent-color: var(--primary); }
  .fo .nm { padding: 10px; font-size: 12px; color: var(--text-dim); text-align: center; }
  .fa {
    display: flex; gap: 3px; padding: 5px 8px;
    border-top: 1px solid var(--border);
  }
  .fa button {
    flex: 1; padding: 4px 6px; border: 1px solid var(--border);
    background: var(--bg); color: var(--text-dim); border-radius: 4px;
    font-size: 10px; cursor: pointer; font-family: inherit;
  }
  .fa button:hover { color: var(--text); border-color: var(--primary); }
  .fl {
    font-size: 10px; color: var(--text-muted); display: block; margin-bottom: 2px;
    letter-spacing: 0.3px;
  }

  /* ── Nav Bar ──────────────────────────────────────────────────────────── */
  .nav-bar {
    background: #1e293b;
    padding: 0 32px;
    display: flex;
    align-items: center;
    height: 52px;
    gap: 0;
  }
  .nav-bar .brand {
    color: #fff;
    font-weight: 700;
    font-size: 14px;
    margin-right: 32px;
    letter-spacing: -0.2px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .nav-bar .brand span { color: var(--primary); }
  .nav-link {
    color: #94a3b8;
    text-decoration: none;
    font-size: 13px;
    font-weight: 500;
    padding: 0 20px;
    height: 52px;
    display: flex;
    align-items: center;
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
  }
  .nav-link:hover { color: #fff; background: rgba(255,255,255,0.05); }
  .nav-link.active {
    color: #fff;
    border-bottom-color: var(--primary);
    background: rgba(255,255,255,0.05);
  }

  /* ── Refresh Button ────────────────────────────────────────────────────── */
  .btn-refresh {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 7px 14px; background: var(--primary); color: #fff;
    border: none; border-radius: var(--radius-sm);
    font-size: 12px; font-weight: 500; font-family: inherit;
    cursor: pointer; white-space: nowrap;
    transition: opacity 0.2s; margin-top: 16px;
  }
  .btn-refresh:hover { opacity: 0.85; }
  .btn-refresh:disabled { opacity: 0.5; cursor: wait; }
  .btn-refresh .spin { display: inline-block; animation: spin 0.7s linear infinite; }

  /* ── Clear All Button ──────────────────────────────────────────────────── */
  .btn-clear {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 7px 12px; background: transparent; color: var(--text-dim);
    border: 1px solid var(--border); border-radius: var(--radius-sm);
    font-size: 12px; font-weight: 500; font-family: inherit;
    cursor: pointer; white-space: nowrap; margin-top: 16px;
    transition: all 0.2s;
  }
  .btn-clear:hover { background: var(--danger-dim); color: var(--danger); border-color: var(--danger); }

  /* ── Upload Button ─────────────────────────────────────────────────────── */
  .btn-upload {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 7px 12px; background: transparent; color: var(--text-dim);
    border: 1px solid var(--border); border-radius: var(--radius-sm);
    font-size: 12px; font-weight: 500; font-family: inherit;
    cursor: pointer; white-space: nowrap; margin-top: 16px;
    transition: all 0.2s;
  }
  .btn-upload:hover { background: var(--primary-dim); color: var(--primary); border-color: var(--primary); }
  .btn-upload:disabled { opacity: 0.5; cursor: wait; }

  /* ── Logout Button ─────────────────────────────────────────────────────── */
  .btn-logout {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 7px 12px; background: transparent; color: var(--text-dim);
    border: 1px solid var(--border); border-radius: var(--radius-sm);
    font-size: 12px; font-weight: 500; font-family: inherit;
    cursor: pointer; white-space: nowrap; margin-top: 16px;
    transition: all 0.2s;
  }
  .btn-logout:hover { background: var(--danger-dim); color: var(--danger); border-color: var(--danger); }

  /* ── Contribution bar ──────────────────────────────────────────────────── */
  .contrib-bar {
    width: 100px; height: 10px; background: var(--bg); border-radius: 5px;
    display: inline-block; overflow: hidden;
  }
  .contrib-bar-fill {
    height: 100%; border-radius: 5px;
    background: linear-gradient(90deg, var(--primary), #00E5FF);
  }

  /* ── KPI Matrix ────────────────────────────────────────────────────────── */
  .target-info {
    background: linear-gradient(135deg, #1e293b, #334155);
    color: #fff;
    padding: 10px 20px;
    border-radius: var(--radius);
    margin-bottom: 16px;
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .target-info .g { color: var(--success); font-weight: 600; }
  .target-info .y { color: #fbbf24; font-weight: 600; }
  .target-info .r { color: #f87171; font-weight: 600; }
  .team-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
    margin-bottom: 18px;
  }
  .team-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 22px;
    text-align: center;
    border-top: 4px solid var(--primary);
    transition: transform 0.15s;
  }
  .team-card:hover { transform: translateY(-2px); box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
  .team-card.alpha { border-top-color: #3b82f6; }
  .team-card.charlie { border-top-color: #8b5cf6; }
  .team-card.delta { border-top-color: #06b6d4; }
  .team-card .name { font-size: 17px; font-weight: 700; }
  .team-card .total { font-size: 26px; font-weight: 800; }
  .team-card .total-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.8px; margin-top: 2px; }
  .team-card .pct { font-size: 24px; font-weight: 700; margin: 4px 0; }
  .team-card .bar { height: 6px; background: #e5e7eb; border-radius: 4px; overflow: hidden; margin-top: 6px; }
  .team-card .bar-fill { height: 100%; border-radius: 4px; transition: width 0.8s ease; }
  .pct-green { color: var(--success) !important; }
  .pct-yellow { color: var(--warning) !important; }
  .pct-red { color: var(--danger) !important; }
  .kpi-card {
    border: none;
    border-radius: var(--radius);
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    overflow: hidden;
    margin-bottom: 18px;
  }
  .kpi-card .card-hdr {
    background: #1e293b;
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    padding: 14px 22px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .kpi-card .card-hdr .badge {
    margin-left: auto;
    font-size: 11px;
    background: rgba(255,255,255,0.1);
    padding: 3px 12px;
    border-radius: 999px;
    font-weight: 500;
  }
  .kpi-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  .kpi-table thead th {
    background: #1e293b !important;
    color: #fff !important;
    font-weight: 600;
    font-size: 12px;
    text-align: center;
    vertical-align: middle;
    padding: 10px 8px !important;
    border: 1px solid #2d3a4e !important;
    white-space: nowrap;
  }
  .kpi-table thead th.team-hdr-alpha { background: #1e40af !important; }
  .kpi-table thead th.team-hdr-charlie { background: #5b21b6 !important; }
  .kpi-table thead th.team-hdr-delta { background: #0e7490 !important; }
  .kpi-table thead th.sub-hdr {
    background: #334155 !important;
    font-size: 11px;
    font-weight: 500;
    padding: 6px 5px !important;
  }
  .kpi-table tbody td {
    padding: 8px 10px !important;
    vertical-align: middle;
    border-bottom: 1px solid #e5e7eb;
    text-align: center;
  }
  .kpi-table tbody td:first-child { font-weight: 600; color: var(--text-dim); width: 40px; }
  .kpi-table tbody td:nth-child(2) { text-align: left; font-weight: 600; }
  .kpi-table tbody td:nth-child(3) { color: var(--text-dim); font-size: 12px; }
  .kpi-table tbody td:nth-child(4) { font-weight: 600; color: #3b82f6; }
  .kpi-table tbody td.num { text-align: right; font-variant-numeric: tabular-nums; }
  .kpi-table tbody tr:nth-child(even) { background: #f8fafc; }
  .kpi-table tbody tr:hover { background: #eef2ff !important; }
  .kpi-table .ach-green { color: #059669 !important; font-weight: 700; }
  .kpi-table .ach-yellow { color: #d97706 !important; font-weight: 700; }
  .kpi-table .ach-red { color: #dc2626 !important; font-weight: 700; }
  .data-missing { color: #9ca3af; font-style: italic; font-size: 12px; }
  @media (max-width: 768px) {
    .team-row { grid-template-columns: 1fr; }
    .kpi-table { font-size: 12px !important; }
    .kpi-table thead th, .kpi-table tbody td { padding: 6px 4px !important; }
  }

  /* ── Login Screen ─────────────────────────────────────────────────────── */
  .login-overlay {
    position: fixed; inset: 0; z-index: 9999;
    display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
  }
  .login-box {
    background: #1e293b; border-radius: 16px; padding: 48px 40px 40px;
    width: 380px; max-width: 90vw;
    box-shadow: 0 25px 60px rgba(0,0,0,0.5);
    border: 1px solid rgba(255,255,255,0.08);
  }
  .login-box .logo {
    text-align: center; margin-bottom: 32px;
  }
  .login-box .logo h1 {
    font-size: 22px; font-weight: 700; color: #fff;
    letter-spacing: -0.5px;
  }
  .login-box .logo h1 span { color: #00C2FF; }
  .login-box .logo p {
    font-size: 12px; color: #94a3b8; margin-top: 4px;
  }
  .login-box .field { margin-bottom: 18px; }
  .login-box label {
    display: block; font-size: 12px; font-weight: 500;
    color: #94a3b8; margin-bottom: 6px; text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .login-box input {
    width: 100%; padding: 12px 14px; border-radius: 8px;
    border: 1px solid #334155; background: #0f172a;
    color: #fff; font-size: 14px; font-family: inherit;
    outline: none; transition: border-color 0.2s;
  }
  .login-box input:focus { border-color: #00C2FF; }
  .login-box input::placeholder { color: #475569; }
  .login-btn {
    width: 100%; padding: 12px; border-radius: 8px;
    border: none; background: #00C2FF; color: #0f172a;
    font-size: 15px; font-weight: 600; font-family: inherit;
    cursor: pointer; transition: all 0.2s; margin-top: 8px;
  }
  .login-btn:hover { background: #38d0ff; }
  .login-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .login-error {
    text-align: center; color: #ef4444; font-size: 13px;
    margin-top: 12px; min-height: 20px;
  }
  .login-box .footer {
    text-align: center; margin-top: 24px;
    font-size: 11px; color: #475569;
  }
</style>
</head>
<body>

<!-- ─── LOGIN SCREEN ──────────────────────────────────────────────────────── -->
<div class="login-overlay" id="loginOverlay">
  <div class="login-box">
    <div class="logo">
      <h1>Samudera Caraka Jasa</h1>
      <p>Sign in to SCJ Dashboard</p>
    </div>
    <div class="field">
      <label>Username</label>
      <input type="text" id="loginUser" placeholder="Enter username" autocomplete="off">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="loginPass" placeholder="Enter password" autocomplete="off">
    </div>
    <button class="login-btn" id="loginBtn" onclick="handleLogin()">Sign In</button>
    <div class="login-error" id="loginError"></div>
    <div class="footer"></div>
  </div>
</div>

<!-- Navigation -->
<div class="nav-bar">
  <div class="brand">Samudera Caraka Jasa</div>
  <a href="#" class="nav-link active" onclick="switchTab('commercial');return false">Commercial KPI</a>
  <a href="#" class="nav-link" onclick="switchTab('operations');return false">Operations Dashboard</a>
</div>

<div class="header">
  <div class="header-left">
    <img class="header-logo" src="SCJ Logo.jpg" alt="Samudera Caraka Jasa">
    <div class="header-title-group">
      <div class="header-title">Samudera Caraka Jasa — <span>Performance</span> Dashboard</div>
    </div>
  </div>
  <div class="header-right">
    <div class="filter-bar" id="filterPanel"></div>
    <button class="btn-clear" id="btnClear" onclick="clearAllFilters()" title="Clear all filters">✕ Clear All</button>
    <button class="btn-refresh" id="btnRefresh" onclick="refreshData()" title="Reload data from Excel file">⟳ Refresh Data</button>
    <button class="btn-upload" id="btnUpload" onclick="document.getElementById('fileInput').click()" title="Upload Excel file (.xls/.xlsx)">↑ Upload Data</button>
    <button class="btn-logout" onclick="logout()" title="Sign out">Logout</button>
    <input type="file" id="fileInput" accept=".xls,.xlsx" style="display:none" onchange="uploadFile(this)">
  </div>
</div>

<div class="container" id="app">
  <div class="loading"><div class="spinner"></div>Loading dashboard...</div>
</div>

<script>
// ─── AUTH ─────────────────────────────────────────────────────────────────────
let AUTH_TOKEN = localStorage.getItem('scj_token') || '';

async function handleLogin() {
  const btn = document.getElementById('loginBtn');
  const err = document.getElementById('loginError');
  btn.disabled = true; btn.textContent = 'Signing in...'; err.textContent = '';
  try {
    const r = await fetch('/api/login', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        username: document.getElementById('loginUser').value,
        password: document.getElementById('loginPass').value
      })
    });
    const d = await r.json();
    if (d.ok && d.token) {
      AUTH_TOKEN = d.token;
      localStorage.setItem('scj_token', d.token);
      document.getElementById('loginOverlay').style.display = 'none';
      initApp();
    } else {
      err.textContent = 'Invalid username or password';
      btn.disabled = false; btn.textContent = 'Sign In';
    }
  } catch(e) {
    err.textContent = 'Connection error: ' + e.message;
    btn.disabled = false; btn.textContent = 'Sign In';
  }
}

function logout() {
  AUTH_TOKEN = '';
  localStorage.removeItem('scj_token');
  document.getElementById('loginOverlay').style.display = 'flex';
}

async function checkAuth() {
  if (!AUTH_TOKEN) return false;
  try {
    const r = await fetch('/api/check-auth', { headers: { 'x-auth-token': AUTH_TOKEN } });
    const d = await r.json();
    return d.ok;
  } catch(e) { return false; }
}

document.getElementById('loginPass').addEventListener('keydown', e => {
  if (e.key === 'Enter') handleLogin();
});
document.getElementById('loginUser').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('loginPass').focus();
});

let activeTab = 'commercial';
let charts = {};
let fullFilterOptions = null;
let commercialData = null;

const COMMERCIAL_TEAMS = ['ALPHA','CHARLIE','DELTA'];
const TEAM_META = { ALPHA: { color: '#3b82f6', cls: 'alpha' }, CHARLIE: { color: '#8b5cf6', cls: 'charlie' }, DELTA: { color: '#06b6d4', cls: 'delta' } };

// ─── Multi-Select Component ─────────────────────────────────────────────────

const FILTER_DEFS = [
  { key: 'month', label: 'Month', getOpts: () => fullFilterOptions.months.map(m => ({ val: String(m.idx), text: m.name })) },
  { key: 'contractHolder', label: 'Customer', getOpts: () => fullFilterOptions.contractHolders.map(v => ({ val: v, text: v })) },
  { key: 'team', label: 'Team', getOpts: () => fullFilterOptions.teams.map(v => ({ val: v, text: v })) },
  { key: 'branch', label: 'Branch', getOpts: () => fullFilterOptions.branches.map(v => ({ val: v, text: v })) },
  { key: 'prefix', label: 'Prefix', getOpts: () => fullFilterOptions.prefixes.map(v => ({ val: v, text: v })) },
  { key: 'carrier', label: 'Carrier', getOpts: () => fullFilterOptions.carriers.map(v => ({ val: v, text: v })) },
  { key: 'origin', label: 'Origin', getOpts: () => fullFilterOptions.origins.map(v => ({ val: v, text: v })) },
  { key: 'region', label: 'Region', getOpts: () => fullFilterOptions.regions.map(v => ({ val: v, text: v })) }
];

let filterState = {};
for (const def of FILTER_DEFS) filterState[def.key] = new Set();

function buildFilterPanel() {
  const panel = document.getElementById('filterPanel');
  panel.innerHTML = '';
  for (const def of FILTER_DEFS) {
    const opts = def.getOpts();
    if (!filterState[def.key]) filterState[def.key] = new Set();
    const wrapper = document.createElement('div');
    wrapper.className = 'fw';
    wrapper.innerHTML = `
      <label class="fl">${def.label}</label>
      <div class="ft" data-key="${def.key}">All</div>
      <div class="fd" data-key="${def.key}">
        <input class="fs" placeholder="Search..." data-key="${def.key}">
        <div class="fo" data-key="${def.key}"></div>
        <div class="fa">
          <button class="ms-select-all" data-key="${def.key}">All</button>
          <button class="ms-clear" data-key="${def.key}">Clear</button>
        </div>
      </div>
    `;
    panel.appendChild(wrapper);
    renderOptions(def.key);
  }
  document.querySelectorAll('.ft').forEach(el => {
    el.addEventListener('click', e => {
      const key = el.dataset.key;
      const dd = document.querySelector(`.fd[data-key="${key}"]`);
      const isOpen = dd.classList.contains('open');
      closeAllDropdowns();
      if (!isOpen) dd.classList.add('open');
      e.stopPropagation();
    });
  });
  document.querySelectorAll('.fs').forEach(el => {
    el.addEventListener('input', e => {
      const key = el.dataset.key;
      const q = el.value.toLowerCase();
      const opts = FILTER_DEFS.find(d => d.key === key).getOpts();
      renderOptions(key, opts.filter(o => o.text.toLowerCase().includes(q)));
    });
  });
  document.querySelectorAll('.ms-clear').forEach(el => {
    el.addEventListener('click', e => {
      const key = el.dataset.key;
      filterState[key].clear();
      renderOptions(key);
      updateTriggerLabel(key);
      fetchWithFilter();
      e.stopPropagation();
    });
  });
  document.querySelectorAll('.ms-select-all').forEach(el => {
    el.addEventListener('click', e => {
      const key = el.dataset.key;
      const opts = FILTER_DEFS.find(d => d.key === key).getOpts();
      opts.forEach(o => filterState[key].add(o.val));
      renderOptions(key);
      updateTriggerLabel(key);
      fetchWithFilter();
      e.stopPropagation();
    });
  });
  document.addEventListener('click', closeAllDropdowns);
}

function renderOptions(key, opts) {
  const container = document.querySelector(`.fo[data-key="${key}"]`);
  if (!container) return;
  if (!opts) opts = FILTER_DEFS.find(d => d.key === key).getOpts();
  if (opts.length === 0) {
    container.innerHTML = '<div class="nm">No match</div>';
    return;
  }
  container.innerHTML = opts.map(o => {
    const checked = filterState[key].has(o.val) ? 'checked' : '';
    return `<label><input type="checkbox" value="${o.val.replace(/"/g,'&quot;')}" ${checked} data-key="${key}"> ${o.text}</label>`;
  }).join('');
  container.querySelectorAll('input[type=checkbox]').forEach(cb => {
    cb.addEventListener('change', e => {
      const k = cb.dataset.key;
      if (cb.checked) filterState[k].add(cb.value);
      else filterState[k].delete(cb.value);
      updateTriggerLabel(k);
      fetchWithFilter();
    });
  });
}

function updateTriggerLabel(key) {
  const trigger = document.querySelector(`.ft[data-key="${key}"]`);
  if (!trigger) return;
  const count = filterState[key].size;
  if (count === 0) trigger.textContent = 'All';
  else trigger.textContent = count + ' selected';
}

function closeAllDropdowns() {
  document.querySelectorAll('.fd.open').forEach(el => el.classList.remove('open'));
}

function clearAllFilters() {
  for (const key of Object.keys(filterState)) {
    filterState[key].clear();
  }
  document.querySelectorAll('.ft').forEach(el => updateTriggerLabel(el.dataset.key));
  document.querySelectorAll('.fo').forEach(el => renderOptions(el.dataset.key));
  fetchWithFilter();
}

function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.nav-link').forEach(el => el.classList.remove('active'));
  if (tab === 'commercial') document.querySelectorAll('.nav-link')[0].classList.add('active');
  else document.querySelectorAll('.nav-link')[1].classList.add('active');
  renderDashboard();
}

async function loadData() {
  try {
    await fetchWithFilter();
  } catch(e) {
    document.getElementById('app').innerHTML = `<div style="text-align:center;padding:60px;color:var(--danger)">Error loading data: ${e.message}</div>`;
  }
}

function getFilterParams() {
  const params = new URLSearchParams();
  for (const def of FILTER_DEFS) {
    const vals = [...filterState[def.key]].filter(Boolean);
    if (vals.length > 0) params.set(def.key, vals.join(','));
  }
  return params;
}

async function fetchWithFilter() {
  const params = getFilterParams();
  const url = '/api/data?' + params.toString();
  const comUrl = '/api/commercial-kpi?' + params.toString();
  try {
    const [dataRes, comRes] = await Promise.all([
      fetch(url, { headers: { 'x-auth-token': AUTH_TOKEN } }),
      fetch(comUrl, { headers: { 'x-auth-token': AUTH_TOKEN } })
    ]);
    allData = await dataRes.json();
    commercialData = await comRes.json();
    if (!fullFilterOptions) fullFilterOptions = allData.filterOptions;
    if (!document.querySelector('.fo[data-key="month"]')?.children.length) {
      buildFilterPanel();
    } else {
      for (const def of FILTER_DEFS) {
        renderOptions(def.key);
        updateTriggerLabel(def.key);
      }
    }
    renderDashboard();
  } catch(e) {
    console.error(e);
  }
}

// ─── RENDER ──────────────────────────────────────────────────────────────────

function renderDashboard() {
  const d = allData;
  const c = commercialData;
  if (!d || !c) return;

  const { kpis, teams, totals, summary: comSummary } = c;
  const totalGP = comSummary.totalGP;
  const totalTarget = comSummary.totalTarget;
  const ach = totalTarget > 0 ? (totalGP / totalTarget) * 100 : 0;
  const gap = totalGP - totalTarget;
  const recCount = comSummary.totalRecords || 0;
  const monthLabels = [...filterState.month].filter(Boolean).join(', ') || 'YTD';
  const activeCustomers = (d.contractHolders || fullFilterOptions?.contractHolders || []).length;
  const gapAbs = Math.abs(gap);
  const gapClass = gap >= 0 ? 'gap-pos' : 'gap-neg';
  const gapLabel = gap >= 0 ? 'Above Target' : 'Below Target';

  const app = document.getElementById('app');

  if (activeTab === 'commercial') {
    let html = '<div class="team-row">';
    teams.forEach(t => {
      const meta = TEAM_META[t];
      const tot = totals[t] || { actual: 0, pct: 0 };
      const pct = tot.pct;
      const pctClass = pct >= 100 ? 'pct-green' : pct >= 80 ? 'pct-yellow' : 'pct-red';
      const barColor = pct >= 100 ? '#059669' : pct >= 80 ? '#d97706' : '#dc2626';
      html += '<div class="team-card ' + meta.cls + '">' +
        '<div class="name">' + t + '</div>' +
        '<div class="total">$' + fmt(tot.actual) + '</div>' +
        '<div class="total-label">GP Achievement</div>' +
        '<div class="pct ' + pctClass + '">' + pct.toFixed(2) + '%</div>' +
        '<div class="bar"><div class="bar-fill" style="width:' + Math.min(pct, 100) + '%;background:' + barColor + '"></div></div>' +
        '</div>';
    });
    html += '</div>';

    html += '<div class="kpi-card">' +
      '<div class="card-hdr">KPI Performance Matrix' +
      '<span class="badge">' + kpis.length + ' KPIs</span></div>' +
      '<div class="table-wrap"><table class="kpi-table">' +
      '<thead><tr>' +
      '<th rowspan="2">No</th>' +
      '<th rowspan="2">KPI</th>' +
      '<th rowspan="2">Prefix</th>' +
      '<th rowspan="2">UoM</th>';
    teams.forEach(t => {
      const meta = TEAM_META[t];
      html += '<th colspan="3" class="team-hdr-' + meta.cls + '">' + t + '</th>';
    });
    html += '</tr><tr>';
    teams.forEach(() => {
      html += '<th class="sub-hdr">Target</th><th class="sub-hdr">Actual</th><th class="sub-hdr">%</th>';
    });
    html += '</tr></thead><tbody>';

    kpis.forEach((k, idx) => {
      const prefixStr = k.prefixes && k.prefixes.length ? k.prefixes.join(', ') : '-';
      html += '<tr>' +
        '<td>' + (idx + 1) + '</td>' +
        '<td>' + k.label + '</td>' +
        '<td style="font-size:12px;color:var(--text-dim)">' + prefixStr + '</td>' +
        '<td>' + k.uom + '</td>';
      teams.forEach(t => {
        const td = k.teams[t] || { target: 0, actual: 0, ach: 0 };
        const actual = td.actual;
        const achPct = td.ach;
        const actualStr = actual === 0 ? '0' : k.code === 'GP' ? '$' + fmt(actual) : fmt(actual);
        const achStr = achPct.toFixed(2) + '%';
        const achClass = achPct >= 100 ? 'ach-green' : achPct >= 80 ? 'ach-yellow' : 'ach-red';
        html += '<td class="num">' + (k.code === 'GP' ? '$' + fmt(td.target) : fmt(td.target)) + '</td>';
        html += '<td class="num">' + actualStr + '</td>';
        html += '<td class="num ' + achClass + '">' + achStr + '</td>';
      });
      html += '</tr>';
    });
    html += '</tbody></table></div></div>';
    app.innerHTML = html;
    destroyCharts();
    return;
  }

  // ── Executive KPI Bar ──
  let html = `
    <div class="exec-bar">
      <div class="exec-bar-item">
        <div class="label">Gross Profit Target</div>
        <div class="value warning">$${fmt(totalTarget)}</div>
        <div class="sub" style="color:var(--text-muted)">${monthLabels} target</div>
      </div>
      <div class="exec-bar-item success">
        <div class="label">Gross Profit Actual</div>
        <div class="value">$${fmt(totalGP)}</div>
        <div class="sub" style="color:var(--text-muted)">${recCount} shipments</div>
      </div>
      <div class="exec-bar-item ach">
        <div class="label">Achievement</div>
        <div class="value" style="color:${ach >= 100 ? 'var(--success)' : ach >= 75 ? 'var(--warning)' : 'var(--danger)'}">${ach.toFixed(1)}%</div>
        <div class="bar-wrap"><div class="bar-fill" style="width:${Math.min(ach,100)}%"></div></div>
        <div class="sub" style="color:${ach >= 100 ? 'var(--success)' : ach >= 75 ? 'var(--warning)' : 'var(--danger)'}">${ach >= 100 ? 'On Target' : ach >= 75 ? 'Needs Focus' : 'Behind Target'}</div>
      </div>
      <div class="exec-bar-item ${gapClass}">
        <div class="label">Gap to Target</div>
        <div class="value">${gap >= 0 ? '+' : '-'}$${fmt(gapAbs)}</div>
        <div class="sub">${gapLabel}</div>
      </div>
    </div>

    <!-- Summary Cards -->
    <div class="summary-row">
      <div class="summary-card gp">
        <div class="label">Total Gross Profit</div>
        <div class="value">$${fmt(totalGP)}</div>
        <div class="sub">${recCount} shipments</div>
      </div>
      <div class="summary-card shipments">
        <div class="label">Total Shipments</div>
        <div class="value">${fmt(recCount)}</div>
        <div class="sub">${monthLabels} volume</div>
      </div>
      <div class="summary-card customers">
        <div class="label">Active Customers</div>
        <div class="value">${activeCustomers}</div>
        <div class="sub">with active bookings</div>
      </div>
    </div>

    <!-- Monthly GP Trend -->
    <div class="full card trend-card">
      <div class="card-title">Monthly Gross Profit Trend</div>
      <canvas id="chartTrend"></canvas>
    </div>

    <!-- Team / Branch -->
    <div class="grid-2">
      <div class="card">
        <div class="card-title">Team Performance</div>
        <canvas id="chartTeamPerf"></canvas>
      </div>
      <div class="card">
        <div class="card-title">Branch Performance</div>
        <canvas id="chartBranch"></canvas>
      </div>
    </div>

    <!-- Top Sales / Volume / Customers -->
    <div class="grid-3">
      <div class="card">
        <div class="card-title">Top Sales by Gross Profit</div>
        <ol class="sales-list" id="topSalesList"></ol>
      </div>
      <div class="card">
        <div class="card-title">Volume by UOM</div>
        <div class="table-wrap">
          <table class="data-table">
            <thead><tr><th>UOM</th><th class="num">Total Volume</th><th class="num">Shipments</th><th class="num">%</th></tr></thead>
            <tbody id="volumeByUomBody"></tbody>
          </table>
        </div>
      </div>
      <div class="card">
        <div class="card-title">Top Customers by Gross Profit</div>
        <div class="table-wrap">
          <table class="data-table">
            <thead><tr><th>#</th><th>Customer</th><th class="num">GP</th><th class="num">Shipments</th><th class="num">Volume</th></tr></thead>
            <tbody id="topCustomersGPTable"></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- Advanced Analytics -->
    <div class="collapsible-header" id="analyticsToggle">
      <span class="arrow">&#9654;</span> Advanced Analytics
    </div>
    <div class="collapsible-body" id="analyticsBody">
      <div class="grid-2" style="margin-bottom:0">
        <div>
          <div class="card-title">Top Customers by Volume</div>
          <div class="table-wrap">
            <table class="data-table">
              <thead><tr><th>#</th><th>Customer</th><th class="num">Volume</th><th>UOM</th><th class="num">Shipments</th><th class="num">GP</th></tr></thead>
              <tbody id="topCustomersVolumeTable"></tbody>
            </table>
          </div>
        </div>
        <div>
          <div class="card-title">Customer Contribution</div>
          <div class="table-wrap">
            <table class="data-table">
              <thead><tr><th>#</th><th>Customer</th><th class="num">GP</th><th class="num">Contribution</th><th class="num">Bar</th></tr></thead>
              <tbody id="customerContributionTable"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  `;

  app.innerHTML = html;

  const toggle = document.getElementById('analyticsToggle');
  const body = document.getElementById('analyticsBody');
  if (toggle && body) {
    toggle.addEventListener('click', () => {
      toggle.classList.toggle('open');
      body.classList.toggle('open');
    });
  }

  renderCharts(d);
  renderTopSales(d);
  renderVolumeByUom(d);
  renderCustomerTables(d);
}

function renderCharts(d) {
  destroyCharts();
  const colors = ['#00C2FF','#22C55E','#F59E0B','#EF4444','#8B5CF6','#EC4899','#14B8A6','#F97316'];
  const textColor = '#6B7280';
  const gridColor = 'rgba(0,0,0,0.06)';
  const commonOpts = {
    responsive: true, maintainAspectRatio: true,
    plugins: { legend: { labels: { color: textColor, font: { size: 11, family: 'Inter' }, boxWidth: 12, padding: 12 } } },
    scales: {
      x: { ticks: { color: textColor, font: { size: 10, family: 'Inter' } }, grid: { color: gridColor } },
      y: { ticks: { color: textColor, font: { size: 10, family: 'Inter' } }, grid: { color: gridColor } }
    }
  };
  const trendEl = document.getElementById('chartTrend');
  if (trendEl && d.gpTrend.length > 0) {
    charts.trend = new Chart(trendEl, {
      type: 'bar',
      data: {
        labels: d.gpTrend.map(r => r.month),
        datasets: [
          { label: 'Target', data: d.gpTrend.map(r => r.target), backgroundColor: 'rgba(245,158,11,0.25)', borderColor: '#F59E0B', borderWidth: 1, borderRadius: 3 },
          { label: 'Actual', data: d.gpTrend.map(r => r.actual), backgroundColor: 'rgba(0,194,255,0.5)', borderColor: '#00C2FF', borderWidth: 1, borderRadius: 3 }
        ]
      },
      options: { ...commonOpts, plugins: { ...commonOpts.plugins, legend: { ...commonOpts.plugins.legend, position: 'top' } }, scales: { ...commonOpts.scales, y: { ...commonOpts.scales.y, beginAtZero: true, ticks: { ...commonOpts.scales.y.ticks, callback: v => '$'+v.toLocaleString() } } } }
    });
  }
  const teamPerfEl = document.getElementById('chartTeamPerf');
  if (teamPerfEl && d.teamPerf.length > 0) {
    charts.teamPerf = new Chart(teamPerfEl, {
      type: 'bar',
      data: {
        labels: d.teamPerf.map(r => r.team),
        datasets: [
          { label: 'GP Actual', data: d.teamPerf.map(r => r.actual), backgroundColor: d.teamPerf.map((_,i) => colors[i % colors.length] + 'CC'), borderColor: d.teamPerf.map((_,i) => colors[i % colors.length]), borderWidth: 1, yAxisID: 'y' },
          { label: 'Ach %', data: d.teamPerf.map(r => r.ach), backgroundColor: 'rgba(0,194,255,0.15)', borderColor: '#00C2FF', borderWidth: 1.5, yAxisID: 'y1', type: 'line', pointRadius: 3, tension: 0.2 }
        ]
      },
      options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { position: 'top', labels: { color: textColor, font: { size: 11, family: 'Inter' }, boxWidth: 12, padding: 12 } } }, scales: { x: { ticks: { color: textColor, font: { size: 10, family: 'Inter' } }, grid: { color: gridColor } }, y: { type: 'linear', display: true, position: 'left', beginAtZero: true, ticks: { color: textColor, font: { size: 10, family: 'Inter' }, callback: v => '$'+v.toLocaleString() }, grid: { color: gridColor } }, y1: { type: 'linear', display: true, position: 'right', beginAtZero: true, max: 200, ticks: { color: '#00C2FF', font: { size: 10, family: 'Inter' }, callback: v => v+'%' }, grid: { display: false } } } }
    });
  }
  const branchEl = document.getElementById('chartBranch');
  if (branchEl && d.branchPerf.length > 0) {
    charts.branch = new Chart(branchEl, {
      type: 'doughnut',
      data: { labels: d.branchPerf.map(r => r.branch), datasets: [{ data: d.branchPerf.map(r => r.actual), backgroundColor: d.branchPerf.map((_,i) => colors[i % colors.length]), borderColor: '#FFFFFF', borderWidth: 3 }] },
      options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { position: 'right', labels: { color: textColor, font: { size: 11, family: 'Inter' }, boxWidth: 12, padding: 12 } }, tooltip: { callbacks: { label: ctx => `${ctx.label}: $${parseFloat(ctx.raw).toLocaleString(undefined, {minimumFractionDigits:2})}` } } } }
    });
  }
}

function renderTopSales(d) {
  const list = document.getElementById('topSalesList');
  if (!list) return;
  list.innerHTML = d.topSales.slice(0, 20).map((s, i) =>
    `<li><span><span class="rank">${i+1}</span><span class="name" title="${s.sales}">${s.sales}</span></span><span><span class="team-tag">${s.team || '-'}</span><span class="gp-val">$${fmt(s.gp)}</span></span></li>`
  ).join('');
}

function renderVolumeByUom(d) {
  const tbody = document.getElementById('volumeByUomBody');
  if (!tbody || !d.volumeByUom) return;
  const totalVol = d.volumeByUom.reduce((s, u) => s + u.totalVolume, 0);
  tbody.innerHTML = d.volumeByUom.map(u => {
    const pct = totalVol > 0 ? (u.totalVolume / totalVol * 100) : 0;
    return `<tr><td class="name">${u.uom}</td><td class="num">${fmt(u.totalVolume)}</td><td class="num">${u.shipmentCount}</td><td class="num">${pct.toFixed(1)}%</td></tr>`;
  }).join('');
}

function renderCustomerTables(d) {
  const gpTable = document.getElementById('topCustomersGPTable');
  if (gpTable && d.topCustomersGP) {
    let html = '';
    d.topCustomersGP.forEach((c, i) => { html += `<tr><td>${i+1}</td><td class="name cell-cust" title="${c.customer.replace(/"/g,'&quot;')}">${c.customer}</td><td class="num">$${fmt(c.gp)}</td><td class="num">${c.shipmentCount}</td><td class="num">${fmt(c.volume)}</td></tr>`; });
    gpTable.innerHTML = html;
  }
  const volTable = document.getElementById('topCustomersVolumeTable');
  if (volTable && d.topCustomersVolume) {
    let html = '';
    d.topCustomersVolume.forEach((c, i) => { html += `<tr><td>${i+1}</td><td class="name cell-cust" title="${c.customer.replace(/"/g,'&quot;')}">${c.customer}</td><td class="num">${fmt(c.volume)}</td><td>${c.uom}</td><td class="num">${c.shipmentCount}</td><td class="num">$${fmt(c.gp)}</td></tr>`; });
    volTable.innerHTML = html;
  }
  const contribTable = document.getElementById('customerContributionTable');
  if (contribTable && d.customerContribution) {
    const maxPct = d.customerContribution.length > 0 ? d.customerContribution[0].contributionPct : 100;
    let html = '';
    d.customerContribution.forEach((c, i) => {
      const barW = maxPct > 0 ? (c.contributionPct / maxPct * 100) : 0;
      html += `<tr><td>${i+1}</td><td class="name cell-cust" title="${c.customer.replace(/"/g,'&quot;')}">${c.customer}</td><td class="num">$${fmt(c.gp)}</td><td class="num">${c.contributionPct.toFixed(1)}%</td><td class="num"><div class="contrib-bar"><div class="contrib-bar-fill" style="width:${barW}%"></div></div></td></tr>`;
    });
    contribTable.innerHTML = html;
  }
}

function destroyCharts() {
  Object.values(charts).forEach(c => { try { c.destroy(); } catch(e) {} });
  charts = {};
}

// ─── REFRESH ──────────────────────────────────────────────────────────────────

async function refreshData() {
  const btn = document.getElementById('btnRefresh');
  btn.disabled = true;
  btn.innerHTML = '<span class="spin">⟳</span> Refreshing...';
  try {
    const r = await fetch('/api/refresh', { headers: { 'x-auth-token': AUTH_TOKEN } });
    const data = await r.json();
    if (data.ok) {
      fullFilterOptions = null;
      await fetchWithFilter();
      btn.innerHTML = '✓ Refreshed';
      setTimeout(() => { btn.innerHTML = '⟳ Refresh Data'; btn.disabled = false; }, 2000);
    }
  } catch(e) {
    btn.innerHTML = '✗ Failed';
    setTimeout(() => { btn.innerHTML = '⟳ Refresh Data'; btn.disabled = false; }, 3000);
  }
}

async function uploadFile(input) {
  const file = input.files[0];
  if (!file) return;
  const btn = document.getElementById('btnUpload');
  btn.innerHTML = '⏳ Uploading...';
  btn.disabled = true;
  const reader = new FileReader();
  reader.onload = async function(e) {
    try {
      const r = await fetch('/api/upload', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-auth-token': AUTH_TOKEN },
        body: JSON.stringify({ file: e.target.result })
      });
      const data = await r.json();
      if (data.ok) {
        fullFilterOptions = null;
        await fetchWithFilter();
        btn.innerHTML = '✓ Uploaded';
      } else {
        btn.innerHTML = '✗ ' + (data.message || 'Failed');
      }
    } catch(e) {
      btn.innerHTML = '✗ Failed';
    }
    setTimeout(() => { btn.innerHTML = '↑ Upload Data'; btn.disabled = false; }, 2500);
    input.value = '';
  };
  reader.readAsDataURL(file);
}

function fmt(n) {
  if (!n && n !== 0) return '0';
  return Number(n).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

// ─── Init ──
const urlTab = new URLSearchParams(window.location.search).get('tab');
if (urlTab === 'operations' || urlTab === 'commercial') activeTab = urlTab;
if (activeTab !== 'commercial') {
  document.querySelectorAll('.nav-link')[0].classList.remove('active');
  document.querySelectorAll('.nav-link')[1].classList.add('active');
}
// ─── INIT ──────────────────────────────────────────────────────────────────

let appStarted = false;
async function initApp() {
  if (appStarted) return;
  appStarted = true;
  await loadData();
}
(async () => {
  const authed = await checkAuth();
  if (authed) {
    document.getElementById('loginOverlay').style.display = 'none';
    initApp();
  }
})();
</script>
